<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root{
    --paper:#F3EDE1;
    --paper-edge:#E7DECC;
    --ink:#2B2723;
    --ink-soft:#6E665C;
    --line:#D2C7B3;
    --red:#B14A30;
    --green:#5E7A52;
    --gold:#B5862E;
    --tag-bg:#EADFC8;
  }
  *{box-sizing:border-box; -webkit-font-smoothing:antialiased;}
  html,body{margin:0;}
  body{
    background:#1C1A17;
    font-family:'Courier New', ui-monospace, SFMono-Regular, Menlo, monospace;
    color:var(--ink);
    min-height:100vh;
    padding:32px 12px 80px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .receipt{
    width:100%;
    max-width:480px;
    background:var(--paper);
    position:relative;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.6);
    padding:0 28px 28px;
  }
  .receipt::before, .receipt::after{
    content:"";
    display:block;
    height:14px;
    width:100%;
    background:
      linear-gradient(135deg, transparent 75%, var(--paper) 75%) 0 0/14px 14px repeat-x,
      linear-gradient(-135deg, transparent 75%, var(--paper) 75%) 0 0/14px 14px repeat-x;
    background-color:transparent;
  }
  .receipt::before{ transform:translateY(0); background-position-y:0; }
  .receipt::after{ transform:rotate(180deg); }

  header{
    text-align:center;
    padding:28px 0 18px;
    border-bottom:2px dashed var(--line);
  }
  .stamp{
    display:inline-block;
    font-family:Arial, Helvetica, sans-serif;
    font-weight:800;
    letter-spacing:.35em;
    font-size:11px;
    color:var(--red);
    border:2px solid var(--red);
    padding:4px 10px;
    transform:rotate(-3deg);
    margin-bottom:14px;
  }
  h1{
    font-family:Arial, Helvetica, sans-serif;
    font-weight:900;
    font-size:30px;
    letter-spacing:.06em;
    margin:0 0 6px;
    text-transform:uppercase;
  }
  .sub{
    font-size:12px;
    color:var(--ink-soft);
    letter-spacing:.08em;
    line-height:1.7;
  }

  nav{
    display:flex;
    gap:0;
    margin:18px 0 0;
    border:1px solid var(--ink);
  }
  nav button{
    flex:1;
    background:transparent;
    border:none;
    border-right:1px solid var(--ink);
    padding:10px 4px;
    font-family:Arial, Helvetica, sans-serif;
    font-weight:800;
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    cursor:pointer;
    color:var(--ink-soft);
  }
  nav button:last-child{border-right:none;}
  nav button.active{ background:var(--ink); color:var(--paper); }

  .panel{ padding-top:18px; }
  .panel.hidden{ display:none; }

  /* LEDGER */
  .day-block{ margin-bottom:22px; }
  .day-head{
    font-family:Arial, Helvetica, sans-serif;
    font-weight:800;
    font-size:12px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--ink-soft);
    border-bottom:1px solid var(--ink);
    padding-bottom:6px;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
  }
  .item{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:8px;
    font-size:13px;
    padding:5px 0;
  }
  .item-name{
    white-space:nowrap;
    overflow:hidden;
    flex-shrink:0;
    max-width:62%;
  }
  .item-name b{ font-weight:700; }
  .leader{
    flex:1;
    border-bottom:1px dotted var(--line);
    margin:0 4px;
    transform:translateY(-3px);
  }
  .item-amt{ white-space:nowrap; font-weight:700; }
  .item-meta{
    font-size:10px;
    color:var(--ink-soft);
    letter-spacing:.04em;
    margin-top:-3px;
    margin-bottom:4px;
    line-height:1.5;
  }
  .tag{
    display:inline-block;
    background:var(--tag-bg);
    color:var(--ink-soft);
    font-size:9px;
    letter-spacing:.12em;
    padding:1px 5px;
    margin-right:4px;
    text-transform:uppercase;
  }
  .tag.pending{ background:#F1DCCB; color:var(--red); }
  .tag.settled{ background:#DDE6D6; color:var(--green); }
  .tag.php{ background:#D9E3EC; color:#3E5A75; }
  .tag.thb{ background:#EFE3D0; color:#8A6A2E; }

  /* SUMMARY */
  .person-card{
    border:1px solid var(--ink);
    margin-bottom:14px;
    padding:12px 14px;
  }
  .person-head{
    font-family:Arial, Helvetica, sans-serif;
    font-weight:900;
    font-size:15px;
    letter-spacing:.06em;
    text-transform:uppercase;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:6px;
    border-bottom:1px dashed var(--line);
    padding-bottom:6px;

  .person-total{ font-size:13px; }
  .owe-row{

    justify-content:space-between;
    font-size:12px;
    padding:2px 0;
    color:var(--ink-soft);
  }
  .owe-row b{ color:var(--ink); font-weight:700; }
  .all-clear{
    text-align:center;
    color:var(--green);
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    padding:4px 0;
  }
  .settled-note{
    font-size:10px;
    color:var(--green);
    letter-spacing:.04em;
    margin:-2px 0 6px;
    line-height:1.5;
  }
  .settled-note b{ font-weight:700; }

  /* BREAKDOWN */
  .bd-group{ margin:6px 0 8px; }
  .bd-group-head{
    font-size:10px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
    border-bottom:1px solid var(--line);
    padding-bottom:2px;
    margin-bottom:4px;
  }
  .bd-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:8px;
    font-size:12px;
    padding:2px 0;
  }
  .bd-row .leader{ flex:1; border-bottom:1px dotted var(--line); margin:0 4px; transform:translateY(-3px); }
  .bd-subtotal{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    font-weight:700;
    border-top:1px dashed var(--line);
    margin-top:4px;
    padding-top:4px;
  }
  .bd-row.is-paid{ color:var(--green); }
  .bd-row.is-paid .leader{ border-bottom-color:#C9D6C2; }
  .paid-stamp{
    font-size:9px;
    letter-spacing:.14em;
    text-transform:uppercase;
    border:1px solid var(--green);
    color:var(--green);
    padding:0 4px;
    margin-left:6px;
    flex-shrink:0;
  }

  /* GRAND TOTAL */
  .grand{
    border-top:2px dashed var(--line);
    margin-top:6px;
    padding-top:14px;
    text-align:center;
  }
  .grand .stamp{ font-size:10px; }
  .grand-line{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    padding:3px 0;
  }
  .grand-line b{ font-family:Arial, Helvetica, sans-serif; }

  /* NOTES / PENDING */
  .note-block{
    font-size:12px;
    line-height:1.7;
    border:1px solid var(--line);
    padding:10px 12px;
    margin-bottom:10px;
    background:#EDE5D4;
  }
  .note-block .h{
    font-family:Arial, Helvetica, sans-serif;
    font-weight:800;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    margin-bottom:4px;
    color:var(--red);
  }
  .note-block.ok .h{ color:var(--green); }
  ul{ margin:4px 0 0; padding-left:18px; }
  li{ margin-bottom:3px; }

  footer{
    text-align:center;
    font-size:10px;
    color:var(--ink-soft);
    letter-spacing:.18em;
    text-transform:uppercase;
    padding-top:18px;
    border-top:2px dashed var(--line);
    margin-top:18px;
  }

  @media (max-width:380px){
    .item-name{ max-width:54%; }
  }
</style>
</head>

  {day:'Day 4 · Free Day', date:'Jun 7', title:'Grab — Khao San Rd → Stay (Art\u2019s side)', currency:'PHP', total:317.03, paidBy:'Art', shares:even(317.03,['Althea','Art','Joshua','Kriselle'])},
  {day:'Day 4 · Free Day', date:'Jun 7', title:'Scoot Excess Baggage', currency:'PHP', total:4518, paidBy:'Louie', shares:{Althea:2259, Kriselle:2259}, paid:['Althea']},
  {day:'Day 4 · Free Day', date:'Jun 7', title:'Grab — Van Transfer to Airport', currency:'PHP', total:1643.16, paidBy:'Art', shares:even(1643.16,M)},
  {day:'Day 4 · Free Day', date:'Jun 7', title:'Scoot Cafe', currency:'PHP', total:983.87, paidBy:'Art', shares:even(983.87,['Althea','Art'])},
];

// ---------- global settled relationships ----------
// These mean: <debtor> has fully settled everything they owed <creditor>.
const settledPairs = [
  // Althea's settlement with Louie is now tracked per-item via paid:[...] arrays below
];
function isPairSettled(debtor, creditor){
  return settledPairs.some(([d,c]) => d===debtor && c===creditor);
}

// ---------- compute balances ----------
// balances[debtor][creditor][currency] += amount
const balances = {};
M.forEach(m=>balances[m]={});

items.forEach(it=>{
  if(!it.shares) return;
  Object.entries(it.shares).forEach(([person,amt])=>{
    if(person===it.paidBy) return;
    if(it.settled && it.settled.includes(person)) return;
    if(it.paid && it.paid.includes(person)) return;
    if(isPairSettled(person, it.paidBy)) return;
    balances[person][it.paidBy] = balances[person][it.paidBy] || {};
    balances[person][it.paidBy][it.currency] = (balances[person][it.paidBy][it.currency]||0) + amt;
  });
});

// ---------- render LEDGER ----------
const ledger = document.getElementById('ledger');
let currentDay = null;
let dayHTML = '';
items.forEach(it=>{
  if(it.day !== currentDay){
    if(currentDay!==null) ledger.innerHTML += dayHTML;
    currentDay = it.day;
    dayHTML = `<div class="day-block"><div class="day-head"><span>${it.day}</span><span>${it.date}</span></div>`;
  }
  const tags = (it.tags||[]).map(t=>`<span class="tag ${t}">${t}</span>`).join('');
  const curTag = `<span class="tag ${it.currency.toLowerCase()}">${it.currency}</span>`;
  dayHTML += `<div class="item">
      <span class="item-name">${it.title}</span>
      <span class="leader"></span>
      <span class="item-amt">${SYM[it.currency]}${it.total.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
    </div>
    <div class="item-meta">paid by <b>${it.paidBy}</b> · ${curTag}${tags}${it.note?(' — '+it.note):''}</div>`;
});
ledger.innerHTML += dayHTML;

// ---------- render SUMMARY ----------
const summary = document.getElementById('summary');
let sHTML = '';
let grandPHP = 0, grandTHB = 0;

function settledBadgeFor(person){
  const lines = [];
  settledPairs.forEach(([d,c])=>{
    if(d===person) lines.push(`settled up with <b>${c}</b>`);
  });
  if(lines.length===0) return '';
  return `<div class="settled-note">✓ ${lines.join(' · ')}</div>`;
}

M.forEach(person=>{
  const owes = balances[person] || {};
  const creditors = Object.keys(owes);
  let totalPHP = 0, totalTHB = 0;
  let rows = '';
  creditors.sort((a,b)=>{
    const av = (owes[a].PHP||0)+(owes[a].THB||0);
    const bv = (owes[b].PHP||0)+(owes[b].THB||0);
    return bv-av;
  }).forEach(creditor=>{
    const c = owes[creditor];
    if(c.PHP){ rows += `<div class="owe-row"><span>→ ${creditor} (PHP)</span><b>₱${c.PHP.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</b></div>`; totalPHP += c.PHP; }
    if(c.THB){ rows += `<div class="owe-row"><span>→ ${creditor} (THB)</span><b>฿${c.THB.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</b></div>`; totalTHB += c.THB; }
  });
  if(person==='Louie'){
    // What others owe Louie (outstanding)
    let owedRows = '';
    let owedPHP=0, owedTHB=0;
    M.filter(m=>m!=='Louie').forEach(debtor=>{
      const d = balances[debtor]['Louie'];
      if(!d) return;
      if(d.PHP){ owedRows += `<div class="owe-row"><span>${debtor} owes me (PHP)</span><b style="color:var(--green)">+₱${d.PHP.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</b></div>`; owedPHP += d.PHP; }
      if(d.THB){ owedRows += `<div class="owe-row"><span>${debtor} owes me (THB)</span><b style="color:var(--green)">+฿${d.THB.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</b></div>`; owedTHB += d.THB; }
    });
    // Debtors who are fully paid up (gross total of paid items, for display only)
    let paidRows = '';
    M.filter(m=>m!=='Louie').forEach(debtor=>{
      let pPHP=0, pTHB=0;
      items.forEach(it=>{
        if(it.paidBy!=='Louie' || !it.shares) return;
        const amt = it.shares[debtor];
        if(amt===undefined) return;
        if(!(it.paid && it.paid.includes(debtor))) return;
        if(it.currency==='PHP') pPHP+=amt; else pTHB+=amt;
      });
      if(pPHP>0.01 || pTHB>0.01){
        const label = [pPHP?`₱${pPHP.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`:null, pTHB?`฿${pTHB.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`:null].filter(Boolean).join(' + ');
        paidRows += `<div class="owe-row"><span>${debtor} owed me</span><b style="color:var(--green)">${label}<span class="paid-stamp">paid</span></b></div>`;
      }
    });
    // What Louie owes others
    let iOweRows = '';
    let iOwePHP=0, iOweTHB=0;
    Object.entries(balances['Louie']).forEach(([creditor, c])=>{
      if(c.PHP){ iOweRows += `<div class="owe-row"><span>I owe ${creditor} (PHP)</span><b style="color:var(--red)">-₱${c.PHP.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</b></div>`; iOwePHP += c.PHP; }
      if(c.THB){ iOweRows += `<div class="owe-row"><span>I owe ${creditor} (THB)</span><b style="color:var(--red)">-฿${c.THB.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</b></div>`; iOweTHB += c.THB; }
    });
    // What Louie has already paid back (gross, display only)
    let iPaidRows = '';
    M.filter(m=>m!=='Louie').forEach(creditor=>{
      let pPHP=0, pTHB=0;
      items.forEach(it=>{
        if(it.paidBy!==creditor || !it.shares) return;
        const amt = it.shares['Louie'];
        if(amt===undefined) return;
        if(!(it.paid && it.paid.includes('Louie'))) return;
        if(it.currency==='PHP') pPHP+=amt; else pTHB+=amt;
      });
      if(pPHP>0.01 || pTHB>0.01){
        const label = [pPHP?`₱${pPHP.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`:null, pTHB?`฿${pTHB.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`:null].filter(Boolean).join(' + ');
        iPaidRows += `<div class="owe-row"><span>I owed ${creditor}</span><b style="color:var(--green)">${label}<span class="paid-stamp">paid</span></b></div>`;
      }
    });
    const divider = `<div style="border-top:1px dashed var(--line);margin:8px 0 6px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);padding-top:6px;">`;
    sHTML += `<div class="person-card">
      <div class="person-head"><span>${person}</span><span class="person-total" style="color:var(--green)">collects ₱${owedPHP.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
      ${divider}Collecting from others</div>
      ${owedRows}
      ${paidRows}
      ${iOweRows || iPaidRows ? `${divider}I owe back</div>${iOweRows}${iPaidRows}` : ''}
      <div style="border-top:2px solid var(--ink);margin-top:8px;padding-top:6px;display:flex;justify-content:space-between;font-size:12px;font-weight:700;">
        <span>Net (PHP)</span><span style="color:var(--green)">₱${(owedPHP - iOwePHP).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
      </div>
      ${owedTHB||iOweTHB ? `<div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;">
        <span>Net (THB)</span><span style="color:${owedTHB-iOweTHB>=0?'var(--green)':'var(--red)'}">฿${(owedTHB - iOweTHB).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
      </div>` : ''}
    </div>`;
    return;
  }
  // Build paid-history (gross totals of fully-paid items) regardless of outstanding balance
  function paidHistoryRows(debtorPerson){
    let rows = '';
    M.filter(m=>m!==debtorPerson).forEach(creditor=>{
      let pPHP=0, pTHB=0;
      items.forEach(it=>{
        if(it.paidBy!==creditor || !it.shares) return;
        const amt = it.shares[debtorPerson];
        if(amt===undefined) return;
        if(!(it.paid && it.paid.includes(debtorPerson))) return;
        if(it.currency==='PHP') pPHP+=amt; else pTHB+=amt;
      });
      if(pPHP>0.01 || pTHB>0.01){
        const label = [pPHP?`₱${pPHP.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`:null, pTHB?`฿${pTHB.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`:null].filter(Boolean).join(' + ');
        rows += `<div class="owe-row"><span>I owed ${creditor}</span><b style="color:var(--green)">${label}<span class="paid-stamp">paid</span></b></div>`;
      }
    });
    return rows;
  }

  if(rows===''){
    const paidHist = paidHistoryRows(person);
    sHTML += `<div class="person-card"><div class="person-head"><span>${person}</span></div>${paidHist?`<div style="border-top:1px dashed var(--line);margin:8px 0 6px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);padding-top:6px;">I owe</div>${paidHist}`:''}<div class="all-clear">all clear</div></div>`;
    return;
  }
  // Also check if this person is owed anything by others
  let collectRows = '';
  let collectPHP=0, collectTHB=0;
  M.filter(m=>m!==person).forEach(debtor=>{
    const d = (balances[debtor]||{})[person];
    if(!d) return;
    if(d.PHP){ collectRows += `<div class="owe-row"><span>${debtor} owes me (PHP)</span><b style="color:var(--green)">+₱${d.PHP.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</b></div>`; collectPHP += d.PHP; }
    if(d.THB){ collectRows += `<div class="owe-row"><span>${debtor} owes me (THB)</span><b style="color:var(--green)">+฿${d.THB.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</b></div>`; collectTHB += d.THB; }
  });
  const divider2 = (label) => `<div style="border-top:1px dashed var(--line);margin:8px 0 6px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);padding-top:6px;">${label}</div>`;
  const paidHist = paidHistoryRows(person);
  sHTML += `<div class="person-card">
    <div class="person-head"><span>${person}</span><span class="person-total">${totalPHP?`₱${totalPHP.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`:''}${(totalPHP&&totalTHB)?' + ':''}${totalTHB?`฿${totalTHB.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`:''}</span></div>
    ${divider2('I owe')}
    ${rows}
    ${paidHist}
    ${collectRows ? divider2('Collecting from others') + collectRows : ''}
  </div>`;
  grandPHP += totalPHP; grandTHB += totalTHB;
});

sHTML += `<div class="grand">
  <div class="stamp">GRAND TOTAL OUTSTANDING</div>
  <div class="grand-line"><span>In Philippine Pesos</span><b>₱${grandPHP.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</b></div>
  <div class="grand-line"><span>In Thai Baht</span><b>฿${grandTHB.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</b></div>
</div>`;
summary.innerHTML = sHTML;

// ---------- render BREAKDOWN (itemized) ----------
const breakdown = document.getElementById('breakdown');
let bHTML = '';

M.forEach(person=>{
  // gather this person's owed lines, grouped by creditor
  const byCreditor = {};
  items.forEach(it=>{
    if(!it.shares) return;
    const amt = it.shares[person];
    if(amt===undefined) return;
    if(person===it.paidBy) return;
    if(it.settled && it.settled.includes(person)) return;
    byCreditor[it.paidBy] = byCreditor[it.paidBy] || [];
    byCreditor[it.paidBy].push({title:it.title, amt, currency:it.currency, isPaid: !!(it.paid && it.paid.includes(person))});
  });

  const creditors = Object.keys(byCreditor);
  if(creditors.length===0){
    bHTML += `<div class="person-card"><div class="person-head"><span>${person}</span></div><div class="all-clear">all clear</div></div>`;
    return;
  }

  let totalPHP=0, totalTHB=0, body='';
  creditors.forEach(creditor=>{
    let subPHP=0, subTHB=0, rows='';
    byCreditor[creditor].forEach(line=>{
      rows += `<div class="bd-row ${line.isPaid?'is-paid':''}">
        <span>${line.title}</span>
        <span class="leader"></span>
        <span>${SYM[line.currency]}${line.amt.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}${line.isPaid?'<span class="paid-stamp">paid</span>':''}</span>
      </div>`;
      if(!line.isPaid){
        if(line.currency==='PHP') subPHP += line.amt; else subTHB += line.amt;
      }
    });
    totalPHP += subPHP; totalTHB += subTHB;
    const subLabel = [subPHP?`₱${subPHP.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`:null, subTHB?`฿${subTHB.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`:null].filter(Boolean).join(' + ');
    body += `<div class="bd-group">
      <div class="bd-group-head">to ${creditor}</div>
      ${rows}
      ${subLabel?`<div class="bd-subtotal"><span>subtotal</span><span>${subLabel}</span></div>`:''}
    </div>`;
  });

  const totalLabel = [totalPHP?`₱${totalPHP.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`:null, totalTHB?`฿${totalTHB.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`:null].filter(Boolean).join(' + ');

  bHTML += `<div class="person-card">
    <div class="person-head"><span>${person}</span><span class="person-total">${totalLabel}</span></div>
    ${body}
  </div>`;
});

breakdown.innerHTML = bHTML;

// ---------- render NOTES ----------
document.getElementById('notes').innerHTML = `
  <div class="note-block ok">

    All the Grab fares that were split between Louie's card and Art's card are now both logged. Art covered his own group's half (Althea, Art, Joshua, Kriselle — or Althea, Art, Cecille, Lawrence for the Khao San Rd leg) for every ride Louie covered for the other half, plus he separately covered the full Van Transfer to Airport for all 8.
  </div>

      <li><b>Silom Cooking Class (₱19,240, paid by Christel)</b> — Kriselle & Joshua still owe Christel ₱2,405 each directly.</li>

    <ul>

      <li><b>Ferry to/from Iconsiam</b> — Christel & Louie already reimbursed Althea their ฿12 each per trip.</li>
      <li><b>Althea ↔ Louie</b> — fully settled both ways. Every item Louie covered for Althea (Van Transfer, Luggage Storage, 7-Eleven Water Run, Grab Pad Kra Pao, Rung Reuang Noodles, Omelette Rice Dinner, Van Rental, Nong Nooch, Sanctuary of Truth, Jeh O Chula, Platinum Mall Disbursement, Check-in Chicken, Scoot Baggage) is marked [paid] in the Breakdown tab. Whatever Louie owed Althea back (Wingstop, 7-Eleven Drinks & Water, Baby Octopus) is also marked [paid].</li>
      <li><b>Christel → Althea</b> — fully settled. Christel has paid Althea back for Wingstop, 7-Eleven Drinks & Water, and Baby Octopus.</li>
      <li>Personal SG snacks (Ya Kun, GBTB, 7-Eleven water bottles) — excluded, treated as individual spend.</li>
    </ul>
  </div>
`;

// ---------- tabs ----------
document.querySelectorAll('nav button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

</script>
